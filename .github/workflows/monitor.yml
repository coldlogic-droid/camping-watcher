name: ⛺ Campsite Monitor

on:
  schedule:
    - cron: '*/17 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install requests
        run: pip install requests

      - name: Check availability and notify
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python check_sites.py
