name: 🔍 Discover Site IDs (Run Once)

on:
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests

      - name: Run checker (debug mode)
        env:
          NTFY_TOPIC: ""
        run: python check_sites.py
