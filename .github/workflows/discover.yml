name: 🔍 Discover Site IDs (Run Once)

on:
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Install camply
        run: pip install camply

      - name: List all GoingToCamp recreation areas (find Parks Canada ID)
        run: camply recreation-areas --provider GoingToCamp

      - name: Find Cyprus Lake campground ID
        run: camply campgrounds --provider GoingToCamp --rec-area ${{ vars.REC_AREA_ID || '1' }}
