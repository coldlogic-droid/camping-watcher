name: 🔍 Discover Site IDs (Run Once)

on:
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Install camply
        run: pip install camply

      - name: Verify camply installed
        run: |
          pip show camply
          camply --version

      - name: List GoingToCamp recreation areas
        run: camply --debug recreation-areas --provider GoingToCamp
