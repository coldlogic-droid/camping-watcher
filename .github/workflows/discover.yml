name: 🔍 Discover Site IDs (Run Once)

on:
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Install camply
        run: pip install camply

      - name: Verify camply installed
        run: |
          pip show camply
          camply --version

      - name: Find Cyprus Lake campground ID
        run: camply campgrounds --provider GoingToCamp --rec-area 14
